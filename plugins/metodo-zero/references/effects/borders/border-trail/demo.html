<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Border Trail — Effects Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="trail-box">
    <h3 class="trail-box__title">Border Trail Effect</h3>
    <p class="trail-box__desc">A glowing trail follows the border path with a smooth fading tail, creating an elegant continuous motion along the element perimeter.</p>
  </div>

  <script src="script.js"></script>
  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'update-param') {
        if (e.data.scope === 'css') document.documentElement.style.setProperty(e.data.key, e.data.value);
      }
    });
  </script>
</body>
</html>
