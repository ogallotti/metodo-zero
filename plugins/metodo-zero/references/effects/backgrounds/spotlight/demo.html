<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotlight — Effects Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="spt-container">
    <div class="spt-ambient"></div>
    <div class="spt-grid"></div>
    <div class="spt-light"></div>
    <div class="spt-light-2"></div>
    <div class="spt-ring"></div>
    <div class="spt-content">
      <h1>Spotlight</h1>
      <p>A glowing spotlight that follows your cursor, revealing a hidden grid</p>
    </div>
  </div>
  <script src="script.js"></script>
  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'update-param') {
        if (e.data.scope === 'css') {
          document.documentElement.style.setProperty(e.data.key, e.data.value);
        }
      }
    });
  </script>
</body>
</html>
