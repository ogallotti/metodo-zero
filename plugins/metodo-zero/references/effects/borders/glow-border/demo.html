<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glow Border — Effects Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="glow-bdr">
    <h3 class="glow-bdr__title">Indigo Glow</h3>
    <p class="glow-bdr__desc">Soft pulsing glow border effect. Hover to lock the glow at peak intensity.</p>
  </div>
  <div class="glow-bdr glow-bdr--purple">
    <h3 class="glow-bdr__title">Purple Glow</h3>
    <p class="glow-bdr__desc">Same effect with a different color. All colors configurable via custom properties.</p>
  </div>

  <script src="script.js"></script>
  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'update-param') {
        if (e.data.scope === 'css') document.documentElement.style.setProperty(e.data.key, e.data.value);
      }
    });
  </script>
</body>
</html>
