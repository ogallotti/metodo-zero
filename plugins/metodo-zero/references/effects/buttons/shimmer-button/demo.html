<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shimmer Button — Effects Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="shimmer-btn">
    <span class="shimmer-btn__text">Discover More</span>
  </button>
  <button class="shimmer-btn shimmer-btn--lg">
    <span class="shimmer-btn__text">Start Free Trial</span>
  </button>

  <script src="script.js"></script>
  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'update-param') {
        if (e.data.scope === 'css') document.documentElement.style.setProperty(e.data.key, e.data.value);
      }
    });
  </script>
</body>
</html>
