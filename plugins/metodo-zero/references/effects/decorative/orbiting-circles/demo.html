<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbiting Circles — Effects Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="oc-stage">
    <div class="oc-orbit oc-orbit-1"></div>
    <div class="oc-orbit oc-orbit-2"></div>
    <div class="oc-orbit oc-orbit-3"></div>
    <div class="oc-dot oc-dot-1"></div>
    <div class="oc-dot oc-dot-2"></div>
    <div class="oc-dot oc-dot-3"></div>
    <div class="oc-dot oc-dot-4"></div>
    <div class="oc-dot oc-dot-5"></div>
    <div class="oc-dot oc-dot-6"></div>
    <div class="oc-center">●</div>
  </div>
  <div class="oc-label">
    <h1>Orbiting Circles</h1>
    <p>CSS-only orbital animation with multiple rings, counter-rotation, and staggered timing.</p>
  </div>
  <script src="script.js"></script>
  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'update-param') {
        if (e.data.scope === 'css') document.documentElement.style.setProperty(e.data.key, e.data.value);
      }
    });
  </script>
</body>
</html>
