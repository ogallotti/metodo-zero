<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rotating Text — Effects Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="rt-container">
    <p class="rt-label">Word rotator</p>
    <h1 class="rt-headline">
      Build
      <span
        class="rt-rotator"
        data-words='["faster.","smarter.","better.","bolder.","together."]'
        data-mode="slide"
        data-interval="2500"
      ></span>
    </h1>
  </div>
  <script src="script.js"></script>
  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'update-param') {
        if (e.data.scope === 'css') {
          document.documentElement.style.setProperty(e.data.key, e.data.value);
        }
      }
    });
  </script>
</body>
</html>
