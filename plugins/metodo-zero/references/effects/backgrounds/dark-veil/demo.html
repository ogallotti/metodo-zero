<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Veil — Effects Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dkv-container" id="dkv-container">
    <div class="dkv-layer dkv-layer--1"></div>
    <div class="dkv-layer dkv-layer--2"></div>
    <div class="dkv-layer dkv-layer--3"></div>
    <div class="dkv-layer dkv-layer--4"></div>
    <div class="dkv-content">
      <h1>Dark Veil</h1>
      <p>Subtle dark mist overlay with parallax mouse movement</p>
    </div>
  </div>
  <script src="script.js"></script>
  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'update-param') {
        if (e.data.scope === 'css') {
          document.documentElement.style.setProperty(e.data.key, e.data.value);
        }
      }
    });
  </script>
</body>
</html>
