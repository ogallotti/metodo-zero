<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Scramble — Effects Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ts-container">
    <p class="ts-label">Decoding the future</p>
    <h1>
      <span
        class="ts-text"
        data-phrases='["Design is intelligence.","Code is poetry.","Less is more.","Ship it fast."]'
        data-scramble-speed="30"
        data-reveal-delay="50"
        data-pause-between="3000"
      ></span>
    </h1>
  </div>
  <script src="script.js"></script>
  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'update-param') {
        if (e.data.scope === 'css') {
          document.documentElement.style.setProperty(e.data.key, e.data.value);
        }
      }
    });
  </script>
</body>
</html>
