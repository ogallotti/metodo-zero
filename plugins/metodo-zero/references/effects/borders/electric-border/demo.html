<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electric Border — Effects Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="elec-bdr">
    <canvas class="elec-bdr__canvas"></canvas>
    <div class="elec-bdr__glow"></div>
    <h3 class="elec-bdr__title">Electric Border Effect</h3>
    <p class="elec-bdr__desc">Jagged lightning arcs crackle along the border with randomized displacement and flickering intensity. Each arc repositions randomly for an organic feel.</p>
  </div>

  <script src="script.js"></script>
  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'update-param') {
        if (e.data.scope === 'css') document.documentElement.style.setProperty(e.data.key, e.data.value);
      }
    });
  </script>
</body>
</html>
