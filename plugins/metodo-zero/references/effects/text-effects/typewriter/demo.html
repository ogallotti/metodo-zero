<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typewriter — Effects Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tw-container">
    <p class="tw-label">We build</p>
    <h1>
      <span
        class="tw-text"
        data-phrases='["products people love.","experiences that convert.","brands that last.","the future of web."]'
        data-type-speed="80"
        data-delete-speed="50"
        data-pause-between="2000"
        data-loop="true"
      ></span><span class="tw-cursor"></span>
    </h1>
  </div>
  <script src="script.js"></script>
  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'update-param') {
        if (e.data.scope === 'css') {
          document.documentElement.style.setProperty(e.data.key, e.data.value);
        }
      }
    });
  </script>
</body>
</html>
