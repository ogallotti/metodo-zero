<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Border Button — Effects Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="abtn">
    <span class="abtn__inner">Get Access</span>
  </button>
  <button class="abtn" style="--abtn-color-1: #10b981; --abtn-color-2: #3b82f6">
    <span class="abtn__inner">Deploy Now</span>
  </button>
  <button class="abtn" style="--abtn-color-1: #f59e0b; --abtn-color-2: #ef4444">
    <span class="abtn__inner">Upgrade Plan</span>
  </button>

  <script src="script.js"></script>
  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'update-param') {
        if (e.data.scope === 'css') document.documentElement.style.setProperty(e.data.key, e.data.value);
      }
    });
  </script>
</body>
</html>
