<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evervault Card — Effects Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ev-card">
    <div class="ev-card__matrix"></div>
    <div class="ev-card__glow"></div>
    <div class="ev-card__content">
      <div class="ev-card__logo">
        <div class="ev-card__logo-icon">E</div>
        <span class="ev-card__logo-text">Evervault</span>
      </div>
      <h3 class="ev-card__title">End-to-End Encryption</h3>
      <p class="ev-card__desc">Encrypt, process, and decrypt sensitive data without ever exposing it.</p>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'update-param') {
        if (e.data.scope === 'css') document.documentElement.style.setProperty(e.data.key, e.data.value);
      }
    });
  </script>
</body>
</html>
