<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Tilt Card — Effects Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tilt-card-wrapper">
    <div class="tilt-card">
      <div class="tilt-card__shine"></div>
      <div class="tilt-card__shadow"></div>
      <img class="tilt-card__image"
           src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=600&h=400&fit=crop"
           alt="Abstract data visualization">
      <div class="tilt-card__content">
        <span class="tilt-card__badge">Featured</span>
        <h3 class="tilt-card__title">Neural Interface Design</h3>
        <p class="tilt-card__desc">Explore the cutting edge of brain-computer interfaces with our latest research findings and prototypes.</p>
      </div>
      <div class="tilt-card__footer">
        <div class="tilt-card__avatar">AK</div>
        <div class="tilt-card__meta">
          <strong>Alex Kim</strong><br>12 min read
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'update-param') {
        if (e.data.scope === 'css') document.documentElement.style.setProperty(e.data.key, e.data.value);
      }
    });
  </script>
</body>
</html>
