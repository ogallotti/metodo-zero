<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warp Background — Effects Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrp-container">
    <canvas id="wrp-canvas"></canvas>
    <div class="wrp-content">
      <h1>Warp Background</h1>
      <p>Stars flying toward you through the void of space</p>
    </div>
  </div>
  <script src="../../_shared/gl-utils.js"></script>
  <script src="script.js"></script>
  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'update-param' && e.data.scope === 'css') {
        document.documentElement.style.setProperty(e.data.key, e.data.value);
      }
    });
  </script>
</body>
</html>
