<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orb — Effects Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="orb-container">
    <div class="orb-sphere">
      <div class="orb-layer orb-layer--1"></div>
      <div class="orb-layer orb-layer--2"></div>
      <div class="orb-layer orb-layer--3"></div>
    </div>
    <div class="orb-content">
      <h1>Orb</h1>
      <p>Soft gradient sphere with parallax movement and layered colors</p>
    </div>
  </div>
  <script src="script.js"></script>
  <script>
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'update-param' && e.data.scope === 'css') {
        document.documentElement.style.setProperty(e.data.key, e.data.value);
      }
    });
  </script>
</body>
</html>
